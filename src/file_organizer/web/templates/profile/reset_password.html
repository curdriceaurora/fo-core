<div class="auth-form">
    <h2>Reset Password</h2>
    {% if error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}
    {% if success %}
    <p class="success-text">{{ success }}</p>
    {% endif %}

    {% if valid_token %}
    <form method="post" action="/ui/profile/reset-password">
        {{ csrf_input(csrf_token) }}
        <input type="hidden" name="token" value="{{ token }}">
        <div class="form-group">
            <label for="new-password">New password</label>
            <input id="new-password" name="new_password" type="password" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirm password</label>
            <input id="confirm-password" name="confirm_password" type="password" required autocomplete="new-password">
        </div>
        <button class="btn-primary" type="submit">Reset password</button>
    </form>
    {% else %}
    <p class="form-hint">Use a valid reset link to change your password.</p>
    {% endif %}

    <p class="auth-switch">
        Back to login:
        <a href="/ui/profile/login" hx-get="/ui/profile/login" hx-target="#auth-panel">Log in</a>
    </p>
</div>
