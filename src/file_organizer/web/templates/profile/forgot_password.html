<div class="auth-form">
    <h2>Forgot Password</h2>
    {% if error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}
    {% if success %}
    <p class="success-text">{{ success }}</p>
    {% endif %}
    <form method="post" action="/ui/profile/forgot-password">
        {{ csrf_input(csrf_token) }}
        <div class="form-group">
            <label for="forgot-email">Email</label>
            <input id="forgot-email" name="email" type="email" required autocomplete="email">
        </div>
        <button class="btn-primary" type="submit">Send reset link</button>
    </form>
    {% if token_preview %}
    <p class="form-hint">Local dev token: <code>{{ token_preview }}</code></p>
    <p class="form-hint">
        <a href="/ui/profile/reset-password?token={{ token_preview }}" hx-get="/ui/profile/reset-password?token={{ token_preview }}" hx-target="#auth-panel">
            Open reset form
        </a>
    </p>
    {% endif %}
    <p class="auth-switch">
        Back to login:
        <a href="/ui/profile/login" hx-get="/ui/profile/login" hx-target="#auth-panel">Log in</a>
    </p>
</div>
