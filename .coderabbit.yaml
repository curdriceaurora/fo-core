## CodeRabbit Configuration
## Excludes internal Claude Code configuration from review

# Files and directories to skip during review
reviews:
  request_changes_workflow: null
  auto_review: true
  auto_reply: true
  review_status:
    high_level_summary: true
    summary_placeholder: true
    walkthrough: true

# Paths to exclude from code review
rules:
  - exclude:
      - ".claude/**"
      - ".vscode/**"
      - ".idea/**"
      - ".DS_Store"
      - "*.log"

# Language-specific settings
language:
  python:
    max_lines_of_code: 500
    enable_docstring_review: true
    enable_type_hints_review: true

# Issue rules
issues:
  critical:
    enabled: true
  major:
    enabled: true
  minor:
    enabled: false

# Comments to suppress
suppress_comments:
  - "skip_review"
  - "wontfix"
  - "duplicate"
