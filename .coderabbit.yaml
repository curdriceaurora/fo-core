# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# CodeRabbit Configuration
# Tuned for higher-signal automated reviews on production PRs.

language: "en-US"
early_access: false

reviews:
  # Prefer deeper analysis over permissive style-only feedback.
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  review_details: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!.claude/**"
    - "!.vscode/**"
    - "!.idea/**"
    - "!.DS_Store"
    - "!*.log"

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/AGENTS.md"
      - ".github/copilot-instructions.md"
      - ".claude/rules/**/*.md"
  learnings:
    scope: "global"
  issues:
    scope: "global"
  pull_requests:
    scope: "global"
  linked_repositories:
    - repository: "curdriceaurora/local-file-organizer"
      instructions: "Shared architecture and CLI behavior references for fo-core."
