# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# CodeRabbit Configuration
# Excludes internal Claude Code configuration from review

language: en

reviews:
  request_changes_workflow: false
  auto_review:
    enabled: true
  review_status: true
  path_filters:
    - "!.claude/**"
    - "!.vscode/**"
    - "!.idea/**"
    - "!.DS_Store"
    - "!*.log"
