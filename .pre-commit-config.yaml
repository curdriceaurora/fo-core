repos:
  # ----------------------------------------------------------------
  # Standard pre-commit hooks: trailing newlines, whitespace, syntax
  # ----------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer      # every file ends with exactly one newline
        exclude: >
          (?x)^(
            \.auto-claude/|
            \.auto-claude-security\.json$|
            \.auto-claude-status$|
            \.claude_settings\.json$
          )
      - id: trailing-whitespace    # strip trailing spaces/tabs
      - id: check-toml             # pyproject.toml syntax validation
      - id: check-yaml             # workflow / config YAML syntax
        exclude: ^mkdocs\.yml$     # mkdocs uses custom Python YAML tags
      - id: check-json             # fixture JSON syntax validation
      - id: check-added-large-files  # blocks accidental binary/model commits
        args: ["--maxkb=500"]

  - repo: local
    hooks:
      # ----------------------------------------------------------------
      # Linting & formatting
      # ruff-check already runs all F rules (incl. F401) per pyproject.toml
      # ----------------------------------------------------------------
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format-check
        name: ruff format check
        entry: ruff format . --check
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # G1: No hardcoded /tmp/ or absolute paths in staged Python diff
      # Use tmp_path fixture in tests; ConfigManager in source.
      # Note: expanduser() is intentionally allowed — it is the correct
      # way to resolve home-directory paths throughout the codebase.
      # Only checks added lines that are not pure comments.
      # ----------------------------------------------------------------
      - id: no-absolute-paths
        name: no absolute paths in Python files (G1)
        entry: >
          bash -c "git diff --cached -- '*.py' | grep -E '^\+.*(/tmp/|/Users/|/home/)' | grep -v '^+++' | grep -vE '^\+\s*#' && echo 'ERROR: hardcoded path in Python — use tmp_path fixture or ConfigManager' && exit 1 || exit 0"
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # G2: No f-strings in logger calls (single or double quote)
      # Matches: logger.debug(f"..."), logger.info(f'...'),
      #          logger.exception( f"..."), etc.
      # ----------------------------------------------------------------
      - id: no-fstrings-in-logger
        name: no f-strings in logger calls (G2)
        entry: >
          bash -c "git diff --cached -- '*.py' | grep -E \"^\+.*logger\s*\.\s*(debug|info|warning|error|critical|exception)\s*\(\s*f['\\\"]\" | grep -v '^+++' && echo 'ERROR: f-string in logger — use: logger.debug(\"msg %s\", var)' && exit 1 || exit 0"
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # No build artifacts committed
      # Covers: .coverage, *.bak, *.pyc, *.pyo, coverage.xml, htmlcov/,
      #         __pycache__/, build/, dist/
      # ----------------------------------------------------------------
      - id: no-build-artifacts
        name: no build artifacts staged
        entry: >
          bash -c "ARTS=$(git diff --cached --name-only | grep -E '\\.(coverage|bak|pyc|pyo)$|^\\.coverage$|(^|/)(__pycache__|build|dist)(/|$)|^coverage\\.xml$|^htmlcov/'); if [ -n \"$ARTS\" ]; then printf 'ERROR: build artifacts staged:\\n%s\\n' \"$ARTS\"; exit 1; fi"
        language: system
        pass_filenames: false

      - id: stale-doc-refs
        name: stale documentation references
        entry: bash .claude/scripts/check-stale-doc-refs.sh --staged-only
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # Tests: smoke suite must pass before commit
      # ----------------------------------------------------------------
      - id: pytest-smoke
        name: pytest (smoke suite)
        entry: bash -c "pytest tests/ -m 'smoke' -q --strict-markers --timeout=30 --override-ini='addopts=' --ignore=tests/extras"
        language: system
        pass_filenames: false

      - id: pytest-ci-lint
        name: pytest (ci guardrails)
        entry: bash -c "pytest tests/ci -q --override-ini='addopts='"
        language: system
        pass_filenames: false

      - id: pytest-affected
        name: pytest (affected tests)
        entry: bash -c "if ! PATHS=$(python scripts/select_tests_for_changes.py --staged --format args); then echo 'affected-test selector failed' >&2; exit 1; fi; [ -z \"$PATHS\" ] && exit 0; pytest $PATHS -q --override-ini='addopts=' --timeout=60"
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # ----------------------------------------------------------------
      # Diff-coverage gate: changed lines must have ≥80% test coverage
      # Runs pytest with coverage, then diff-cover against merge base.
      # Skips if no src/ Python files are staged.
      # ----------------------------------------------------------------
      - id: diff-cover
        name: diff-cover gate (80%)
        entry: |
          bash -c '
          CHANGED=$(git diff --cached --name-only -- "src/**/*.py" "src/*.py")
          if [ -z "$CHANGED" ]; then exit 0; fi
          MERGE_BASE=$(git merge-base HEAD origin/main 2>/dev/null || echo HEAD~1)
          pytest tests/ -q --override-ini="addopts=" --cov=src --cov-report=xml:coverage.xml --no-header 2>/dev/null
          diff-cover coverage.xml --compare-branch="$MERGE_BASE" --fail-under=80 --quiet
          '
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # ----------------------------------------------------------------
      # Spelling
      # ----------------------------------------------------------------
      - id: codespell
        name: codespell
        entry: bash -c "CODESPELL=$(.venv/bin/codespell --version >/dev/null 2>&1 && echo .venv/bin/codespell || echo codespell); $CODESPELL src/ docs/ --config .codespellrc"
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # Strict mypy gate: all source packages
      # ----------------------------------------------------------------
      - id: mypy-changed
        name: mypy (all source packages)
        entry: bash scripts/run-mypy-changed.sh
        language: system
        files: ^src/.*\.py$
        pass_filenames: true

      # ----------------------------------------------------------------
      # PyPI version validation
      # ----------------------------------------------------------------
      - id: pypi-version-check
        name: Verify pyproject.toml minimum versions exist on PyPI
        entry: python3 .claude/scripts/check_pypi_versions.py
        language: system
        files: ^pyproject\.toml$
        pass_filenames: false

      # ----------------------------------------------------------------
      # C4: Coverage threshold drift detection (G4)
      # When pyproject.toml is staged with a changed cov-fail-under value,
      # greps docs for stale references to the old percentage.
      # ----------------------------------------------------------------
      - id: threshold-drift-check
        name: coverage threshold drift (C4)
        entry: bash .claude/scripts/check-threshold-drift.sh
        language: system
        files: ^pyproject\.toml$
        pass_filenames: false

      # ----------------------------------------------------------------
      # S1/S2: Search corpus safety — symlink and hidden-file filters (G2)
      # When search service files are staged, verify any rglob/walk calls
      # include the required is_symlink() and startswith(".") guards.
      # ----------------------------------------------------------------
      - id: search-corpus-safety
        name: search corpus safety (S1/S2)
        entry: bash -c "pytest tests/ci/test_search_code_quality.py -k 'symlink or hidden' -q --override-ini='addopts='"
        language: system
        files: ^src/services/search/
        pass_filenames: false

      # ----------------------------------------------------------------
      # T10: Predicate negative-case coverage (phase 2 — commit-time)
      # Fires when detector modules or their paired test files are staged.
      # Phase 1 CI test (test_predicate_negative_coverage.py) remains as backstop.
      # ----------------------------------------------------------------
      - id: predicate-negative-coverage
        name: T10 predicate negative-case coverage
        entry: python .claude/scripts/check_predicate_negative_coverage.py
        language: system
        files: ^(src/review_regressions/|tests/unit/review_regressions/test_)
        pass_filenames: true

      # ----------------------------------------------------------------
      # Unused dependency detection
      # ----------------------------------------------------------------
      - id: deptry
        name: deptry (unused deps)
        entry: bash -c "DEPTRY=$(.venv/bin/deptry --version >/dev/null 2>&1 && echo .venv/bin/deptry || echo deptry); $DEPTRY src/"
        language: system
        pass_filenames: false
        files: ^(src/|pyproject\.toml)

  # ----------------------------------------------------------------
  # Markdown linting
  # ----------------------------------------------------------------
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.35
    hooks:
      - id: pymarkdown
        args: ["-c", ".pymarkdown.json", "scan"]
        exclude: >
          (?x)^(
            \.claude/|
            \.auto-claude/|
            memory/test-generation-patterns\.md|
            docs/internal/|
            docs/testing/|
            docs/developer/testing\.md|
            \.github/copilot-instructions\.md|
            src/services/deduplication/README_IMAGE_DEDUP\.md|
            tests/fixtures/
          )
