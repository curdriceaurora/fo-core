repos:
  - repo: local
    hooks:
      # ----------------------------------------------------------------
      # Linting & formatting
      # ruff-check already runs all F rules (incl. F401) per pyproject.toml
      # ----------------------------------------------------------------
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format-check
        name: ruff format check
        entry: ruff format . --check
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # G1: No hardcoded /tmp/ or absolute paths in staged Python diff
      # Use tmp_path fixture in tests; ConfigManager in source.
      # Note: expanduser() is intentionally allowed — it is the correct
      # way to resolve home-directory paths throughout the codebase.
      # Only checks added lines that are not pure comments.
      # ----------------------------------------------------------------
      - id: no-absolute-paths
        name: no absolute paths in Python files (G1)
        entry: bash -c "git diff --cached -- '*.py' | grep -E '^\\+.*(/tmp/|/Users/|/home/)' | grep -v '^+++' | grep -vE '^\\+\\s*#' && echo 'ERROR: hardcoded path in Python — use tmp_path fixture or ConfigManager' && exit 1 || exit 0"
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # G2: No f-strings in logger calls (single or double quote)
      # Matches: logger.debug(f"..."), logger.info(f'...'),
      #          logger.exception( f"..."), etc.
      # ----------------------------------------------------------------
      - id: no-fstrings-in-logger
        name: no f-strings in logger calls (G2)
        entry: bash -c "git diff --cached -- '*.py' | grep -E \"^\\+.*logger\\s*\\.\\s*(debug|info|warning|error|critical|exception)\\s*\\(\\s*f['\\\"]\" | grep -v '^+++' && echo 'ERROR: f-string in logger — use: logger.debug(\"msg %s\", var)' && exit 1 || exit 0"
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # No build artifacts committed
      # Covers: .coverage, *.bak, *.pyc, *.pyo, coverage.xml, htmlcov/,
      #         __pycache__/, build/, dist/
      # ----------------------------------------------------------------
      - id: no-build-artifacts
        name: no build artifacts staged
        entry: bash -c "ARTS=$(git diff --cached --name-only | grep -E '\\.(coverage|bak|pyc|pyo)$|^\\.coverage$|(^|/)(__pycache__|build|dist)(/|$)|^coverage\\.xml$|^htmlcov/'); if [ -n \"$ARTS\" ]; then printf 'ERROR: build artifacts staged:\\n%s\\n' \"$ARTS\"; exit 1; fi"
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # Tests: smoke suite must pass before commit
      # ----------------------------------------------------------------
      - id: pytest-smoke
        name: pytest (smoke suite)
        entry: bash -c "pytest tests/ -m 'smoke' -q --strict-markers --timeout=30 --override-ini='addopts='"
        language: system
        pass_filenames: false

      - id: pytest-ci-lint
        name: pytest (ci guardrails)
        entry: pytest tests/ci -q --override-ini="addopts="
        language: system
        pass_filenames: false

      - id: pytest-websocket
        name: pytest (websocket validations)
        entry: bash -c "pytest tests/test_api_websocket.py -q --override-ini='addopts='"
        language: system
        pass_filenames: false

      - id: pytest-web-ui
        name: pytest (web ui)
        entry: bash -c "pytest tests/test_web_ui.py -q --override-ini='addopts='"
        language: system
        pass_filenames: false

      # ----------------------------------------------------------------
      # Spelling
      # ----------------------------------------------------------------
      - id: codespell
        name: codespell
        entry: bash -c "codespell src/ docs/ --config .codespellrc"
        language: system
        pass_filenames: false

  # ----------------------------------------------------------------
  # Markdown linting
  # ----------------------------------------------------------------
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.35
    hooks:
      - id: pymarkdown
        args: ["-c", ".pymarkdown.json", "scan"]
