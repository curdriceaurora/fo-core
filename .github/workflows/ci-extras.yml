name: Extras Validation

# Validates that each optional extra can be installed, imported, and (for
# file-capability extras) passes a minimal smoke canary test.
#
# Extras classification:
#   file-capability (install + import + smoke): media, dedup-text, dedup-image, scientific, cad
#   platform/API    (install + import only):    cloud, llama, claude, mlx
#
# mlx is Darwin-only and runs on macos-latest.
# media/dedup-image may take 20-40 min to install due to large binary wheels (torch, cv2).

on:
  pull_request:
    branches: [main, epic/flatten-src-fo]
    paths-ignore:
      - ".claude/**"
      - "docs/**"
      - "*.md"
  push:
    branches: [main]
    paths-ignore:
      - ".claude/**"
      - "docs/**"
      - "*.md"

permissions:
  contents: read

jobs:
  extras-validate:
    name: "Extras [${{ matrix.extra }}]"
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- File capability extras (install + import + smoke canary) ---
          - extra: media
            os: ubuntu-latest
            timeout_minutes: 30
            key_import: "import faster_whisper; import cv2; print('OK')"
            smoke: "true"
            test_file: tests/extras/test_extras_media.py
          - extra: dedup-text
            os: ubuntu-latest
            timeout_minutes: 20
            key_import: "import sklearn; print('OK')"
            smoke: "true"
            test_file: tests/extras/test_extras_dedup_text.py
          - extra: dedup-image
            os: ubuntu-latest
            timeout_minutes: 40
            key_import: "import imagededup; import torch; print('OK')"
            smoke: "true"
            test_file: tests/extras/test_extras_dedup_image.py
          - extra: scientific
            os: ubuntu-latest
            timeout_minutes: 10
            key_import: "import h5py; import netCDF4; import scipy; print('OK')"
            smoke: "true"
          - extra: cad
            os: ubuntu-latest
            timeout_minutes: 10
            key_import: "import ezdxf; print('OK')"
            smoke: "true"
          # --- Platform/API extras (install + import only) ---
          - extra: cloud
            os: ubuntu-latest
            timeout_minutes: 10
            key_import: "import openai; print('OK')"
            smoke: "false"
          - extra: claude
            os: ubuntu-latest
            timeout_minutes: 10
            key_import: "import anthropic; print('OK')"
            smoke: "false"
          - extra: llama
            os: ubuntu-latest
            timeout_minutes: 20  # llama-cpp-python build is large
            key_import: "import llama_cpp; print('OK')"
            smoke: "false"
          - extra: mlx
            os: macos-latest
            timeout_minutes: 15
            key_import: "import mlx_lm; print('OK')"
            smoke: "false"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install extra with dev dependencies
        # .[dev,extra] ensures pytest and repo test toolchain are present for canary runs.
        # Retry wrapper guards against transient TLS/CDN flakes (issue #145).
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08  # v3.0.2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: pip install -e ".[dev,${{ matrix.extra }}]"

      - name: Verify key imports
        run: python -c "${{ matrix.key_import }}"

      - name: Run smoke canary
        if: matrix.smoke == 'true'
        run: |
          TEST_FILE="${{ matrix.test_file || format('tests/extras/test_extras_{0}.py', matrix.extra) }}"
          pytest "$TEST_FILE" \
            -m "smoke" \
            -x \
            -v \
            --override-ini="addopts="
