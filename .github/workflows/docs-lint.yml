name: Lint Markdown

on: [push, pull_request]

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install pymarkdown
        run: pip install 'pymarkdownlnt==0.9.25'
      - name: Run markdown linting
        run: |
          # Scan all tracked markdown files in repository (including nested)
          # using git ls-files to match pre-commit hook behavior
          pymarkdown -c .pymarkdown.json scan $(git ls-files '*.md')
