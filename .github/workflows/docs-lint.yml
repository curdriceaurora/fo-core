name: Lint Markdown

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install pymarkdown
        run: pip install 'pymarkdownlnt==0.9.25'
      - name: Run markdown linting
        run: |
          # Scan all tracked markdown files in repository (including nested)
          # using git ls-files to match pre-commit hook behavior
          pymarkdown -c .pymarkdown.json scan $(git ls-files '*.md')
