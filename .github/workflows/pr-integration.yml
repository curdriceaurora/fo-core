name: PR Integration Tests

# Runs the full integration test suite on every push to an open PR.
# Triggered on:
#   opened          — first feedback when the PR is created
#   reopened        — re-validation after a PR is un-closed
#   ready_for_review — re-validation when a draft PR transitions to ready
#   synchronize     — re-validation on every push to the PR (fixup commits, code updates)
#
# Cost is bounded by concurrency.cancel-in-progress: true, which cancels any
# in-flight run when a new push arrives. This ensures only the latest commit
# on the PR runs integration tests, preventing stale results from blocking merge.
#
# Relationship to other jobs:
#   ci.yml test         → per-commit fast gate        (ci-marked tests, ~2 min)
#   pr-integration.yml  → on every push to open PR    (integration tests, ~3–5 min, bounded by concurrency)
#   ci.yml test-full    → post-merge full suite       (6 shards × 2 pythons, main push)
#   ci-full.yml         → nightly full matrix         (Linux + macOS + Windows)

on:
  pull_request:
    branches: [main, epic/flatten-src-fo]
    types: [opened, reopened, ready_for_review, synchronize]
    paths-ignore:
      - ".claude/**"
      - "docs/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: pr-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test-integration-pr:
    name: "Integration tests (PR)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -e ".[dev,search]"
          pip install "pytest-asyncio>=0.23.0" faker --no-cache-dir
      - name: Run integration tests
        # --cov adds ~15-20% overhead to the 3-5 min run; bounded by cancel-in-progress.
        # Output teed to RUNNER_TEMP so the per-module floor script can parse it.
        id: integration_tests
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          pytest tests/ \
            --strict-markers \
            -m "integration and not benchmark" \
            --cov=src \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --timeout=60 \
            -n=auto \
            --override-ini="addopts=" \
            | tee "$RUNNER_TEMP/integration-coverage-report.txt"

      - name: Check per-module integration coverage floors
        id: per_module_gate
        if: always() && steps.integration_tests.outcome != 'cancelled'
        continue-on-error: true
        run: |
          python scripts/check_module_coverage_floor.py \
            --report-path "$RUNNER_TEMP/integration-coverage-report.txt" \
            --baseline-path scripts/coverage/integration_module_floor_baseline.json

      - name: Check global integration coverage floor
        id: global_gate
        if: always() && steps.integration_tests.outcome != 'cancelled'
        continue-on-error: true
        run: coverage report --fail-under=71.9

      - name: Enforce integration gate outcomes
        if: always() && steps.integration_tests.outcome != 'cancelled'
        run: |
          if [ "${{ steps.integration_tests.outcome }}" != "success" ]; then
            echo "FAIL: integration tests failed before coverage gates could run"
            exit 1
          fi
          if [ "${{ steps.per_module_gate.outcome }}" != "success" ]; then
            echo "FAIL: per-module integration coverage gate failed"
            exit 1
          fi
          if [ "${{ steps.global_gate.outcome }}" != "success" ]; then
            echo "FAIL: global integration coverage floor failed (< 71.9%)"
            exit 1
          fi
          echo "OK: all integration coverage gates passed"
