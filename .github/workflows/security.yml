name: Security

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC
  pull_request:
    branches: [main, epic/flatten-src-fo]
    paths-ignore:
      - ".claude/agents/**"
      - ".claude/commands/**"
      - ".claude/context/**"
      - ".claude/epics/**"
      - ".claude/prds/**"
      - ".claude/rules/**"
      - ".claude/README.md"

permissions:
  contents: read

jobs:
  audit-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install pip-audit + gate deps
        # Retry wrapper guards against transient TLS/CDN flakes (issue #145).
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: error
          command: pip install pip-audit pyyaml packaging
      - name: Audit dependencies
        # Runs pip-audit against the installed environment, then feeds the JSON
        # report to scripts/pip_audit_gate.py which enforces .github/accepted-risks.yml.
        # The inner `pip install -e .` also downloads wheels, so the whole step is
        # wrapped in retry to recover from transient flakes (issue #145). E2 of the
        # hardening roadmap (#158) removed the previous `continue-on-error: true`.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            set -euo pipefail
            pip install -e . >/dev/null
            # pip-audit exits non-zero when any vuln is present (expected) OR
            # when the tool itself crashes (network, schema change). Separate
            # the two: capture the exit code, then verify audit.json is
            # non-empty before feeding to the gate. Without this, a pip-audit
            # crash would produce an empty audit.json and the gate's
            # json.loads() would raise an ugly traceback.
            # `pip-audit .` audits project dependencies declared in pyproject.toml
            # (the `.` positional scopes to the project); without it, bare
            # `pip-audit` would scan the entire environment including the
            # pip-audit tool itself and the gate's pyyaml/packaging deps, which
            # are out-of-scope for .github/accepted-risks.yml.
            set +e
            pip-audit . --format=json > audit.json
            audit_exit=$?
            set -e
            if [ ! -s audit.json ]; then
              echo "::error::pip-audit produced no output (exit $audit_exit) — likely a crash"
              exit 1
            fi
            python3 scripts/pip_audit_gate.py \
              --audit audit.json \
              --allowlist .github/accepted-risks.yml

  audit-dependencies-extras:
    # Mirrors `audit-dependencies` but installs `.[all]` so transitive risks
    # from optional extras (`[llama]`, `[media]`, `[search]`, `[dedup-*]`,
    # `[scientific]`, `[cad]`, `[claude]`, `[mlx]`, `[cloud]`) are audited
    # against .github/accepted-risks-extras.yml. Separate job + separate
    # allowlist because the base audit would fail on
    # "allowlist entry for uninstalled package" if extras entries leaked
    # into .github/accepted-risks.yml (#166).
    #
    # Matrix across Linux + macOS so platform-gated extras (currently
    # `mlx-lm`, pinned to `platform_system == 'Darwin'`) actually get
    # audited. Running only on ubuntu-latest would silently leave
    # macOS-only dependencies out of the coverage footprint — a real gap
    # codex caught on PR #171.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          # Cache pip wheels keyed on pyproject.toml so the `.[all]` install
          # (torch / opencv / faster-whisper — ~1 GB) doesn't re-download on
          # every schedule/PR run. Keeps the retry wrapper for genuine CDN
          # flakes but dramatically narrows its blast radius.
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install pip-audit + gate deps
        # Upgrade pip first so both matrix variants (ubuntu-latest +
        # macos-latest) audit the same pip version. Without the explicit
        # upgrade, the GitHub-hosted runner's bundled pip drifted between
        # OSes (ubuntu-latest installed pip 26.1, macos-latest stayed on
        # the cached 26.0.1), producing platform-asymmetric pip-audit
        # output and breaking the gate's allowlist accounting.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: error
          command: |
            python -m pip install --upgrade pip
            pip install pip-audit pyyaml packaging
      - name: Audit dependencies (.[all])
        # `.[all]` pulls torch / opencv / faster-whisper / etc. — expect this
        # step to be slower than the base audit. The retry wrapper also guards
        # the large wheel downloads against transient CDN flakes (issue #145).
        #
        # `pip-audit` (no path argument) audits the **installed environment**
        # — which is exactly what we need here: `.[all]` has put every extra's
        # transitive graph on disk, and that's what we want scanned.
        # `pip-audit .` is project-path mode and ONLY inspects the
        # `[project.dependencies]` block in pyproject.toml, silently ignoring
        # `[project.optional-dependencies]`. Running the path form against a
        # `.[all]`-installed env would defeat the whole reason this job exists.
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_on: error
          command: |
            set -euo pipefail
            # Quote `.[all]` so bracket-glob-enabled shells (zsh / bash with
            # failglob) can't accidentally expand or null-match it.
            pip install -e '.[all]' >/dev/null
            set +e
            # Environment mode (no `.` argument) — audits the installed
            # graph, not pyproject.toml. See the long comment on the step.
            pip-audit --format=json > audit-extras.json
            audit_exit=$?
            set -e
            if [ ! -s audit-extras.json ]; then
              echo "::error::pip-audit produced no output (exit $audit_exit) — likely a crash"
              exit 1
            fi
            python3 scripts/pip_audit_gate.py \
              --audit audit-extras.json \
              --allowlist .github/accepted-risks-extras.yml

  bandit-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install bandit
        # Retry wrapper guards against transient TLS/CDN flakes (issue #145).
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: error
          command: pip install bandit[toml]
      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml || true

  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
