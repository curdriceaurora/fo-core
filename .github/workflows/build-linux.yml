name: Build Linux

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Linux (x86_64)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2

      - name: Install Python dependencies
        working-directory: file_organizer_v2
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build executable
        working-directory: file_organizer_v2
        run: python scripts/build.py --clean

      - name: Create AppImage
        working-directory: file_organizer_v2
        run: bash scripts/build_linux.sh

      - name: Upload AppImage and tarball
        uses: actions/upload-artifact@v4
        with:
          name: file-organizer-linux-x86_64
          path: |
            file_organizer_v2/dist/*.AppImage
            file_organizer_v2/dist/*.tar.gz
            file_organizer_v2/dist/*.sha256
          retention-days: 30
