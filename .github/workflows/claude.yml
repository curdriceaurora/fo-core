name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@536f2c32a39763739000b0e1ac69ca2647d97ce9
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
