name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@b8af2aac9666eb9921246e2d2b46a8e8fcfabc88
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
