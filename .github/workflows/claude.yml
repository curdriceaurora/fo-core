name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
