name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@e58dfa55559035499a4982426bb73605e8b5ad8e
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
