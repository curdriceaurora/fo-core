name: Build macOS

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: x86_64

    runs-on: ${{ matrix.os }}
    name: macOS (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: file_organizer_v2
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build executable
        working-directory: file_organizer_v2
        run: python scripts/build.py --clean

      - name: Create DMG
        working-directory: file_organizer_v2
        run: bash scripts/build_macos.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: file-organizer-macos-${{ matrix.arch }}-dmg
          path: |
            file_organizer_v2/dist/*.dmg
            file_organizer_v2/dist/*.sha256
          retention-days: 30
