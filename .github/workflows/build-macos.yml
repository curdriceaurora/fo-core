name: Build macOS

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: x86_64

    runs-on: ${{ matrix.os }}
    name: macOS (${{ matrix.arch }})
    env:
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: file_organizer_v2
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build executable
        working-directory: file_organizer_v2
        run: python scripts/build.py --clean

      - name: Create DMG
        working-directory: file_organizer_v2
        run: |
          args=()
          if [[ -n "${MACOS_SIGN_IDENTITY:-}" ]]; then
            args+=(--sign "${MACOS_SIGN_IDENTITY}")
            if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_PASSWORD:-}" ]]; then
              args+=(--notarize)
            fi
          fi
          bash scripts/build_macos.sh "${args[@]}"

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: file-organizer-macos-${{ matrix.arch }}-bin
          path: |
            file_organizer_v2/dist/file-organizer-*
          retention-days: 30

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: file-organizer-macos-${{ matrix.arch }}-dmg
          path: |
            file_organizer_v2/dist/*.dmg
            file_organizer_v2/dist/*.sha256
          retention-days: 30

  build-universal:
    needs: build-macos
    runs-on: macos-latest
    name: macOS (universal)
    env:
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 executable
        uses: actions/download-artifact@v4
        with:
          name: file-organizer-macos-arm64-bin
          path: artifacts/arm64

      - name: Download x86_64 executable
        uses: actions/download-artifact@v4
        with:
          name: file-organizer-macos-x86_64-bin
          path: artifacts/x86_64

      - name: Create universal DMG
        working-directory: file_organizer_v2
        run: |
          ARM_EXEC=$(find ../artifacts/arm64 -type f -name "file-organizer-*" ! -name "*.dmg" ! -name "*.sha256" | head -1)
          X86_EXEC=$(find ../artifacts/x86_64 -type f -name "file-organizer-*" ! -name "*.dmg" ! -name "*.sha256" | head -1)
          if [[ -z "$ARM_EXEC" || -z "$X86_EXEC" ]]; then
            echo "ERROR: Missing arm64 or x86_64 executables."
            exit 1
          fi
          chmod +x "$ARM_EXEC" "$X86_EXEC"
          mkdir -p dist
          args=(--universal --arm "$ARM_EXEC" --x86 "$X86_EXEC")
          if [[ -n "${MACOS_SIGN_IDENTITY:-}" ]]; then
            args+=(--sign "${MACOS_SIGN_IDENTITY}")
            if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_PASSWORD:-}" ]]; then
              args+=(--notarize)
            fi
          fi
          bash scripts/build_macos.sh "${args[@]}"

      - name: Upload universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: file-organizer-macos-universal-dmg
          path: |
            file_organizer_v2/dist/*universal*.dmg
            file_organizer_v2/dist/*universal*.sha256
          retention-days: 30
