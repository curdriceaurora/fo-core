name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".claude/agents/**"
      - ".claude/commands/**"
      - ".claude/context/**"
      - ".claude/epics/**"
      - ".claude/prds/**"
      - ".claude/rules/**"
      - ".claude/README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".claude/agents/**"
      - ".claude/commands/**"
      - ".claude/context/**"
      - ".claude/epics/**"
      - ".claude/prds/**"
      - ".claude/rules/**"
      - ".claude/README.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pre-commit
      - run: pip install -e ".[dev]"
      - run: pre-commit run --all-files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unused-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install "deptry>=0.16.0"
      - run: pip install -e .
      - run: deptry src/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run mypy on gated modules
        run: mypy src/file_organizer/models/

  link-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check documentation links
        run: |
          echo "Checking for broken documentation links..."

          # Extract markdown links from README and docs
          links=$(grep -r -h "\[.*\](.*)" README.md docs/*.md 2>/dev/null | sed -E 's/.*\(([^)]+)\).*/\1/' | grep -E "^\/" | sort -u)

          failed=0
          for link in $links; do
            # Skip external links and anchors
            if [[ "$link" == http* ]]; then
              continue
            fi

            # Remove anchor parts
            filepath=${link%#*}

            # Check if file exists
            if [[ ! -f "$filepath" ]]; then
              echo "❌ Broken link: $link"
              failed=1
            fi
          done

          if [ $failed -eq 1 ]; then
            echo "Some documentation links are broken!"
            exit 1
          fi

          echo "✅ All documentation links are valid"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJson('["3.11"]') || fromJson('["3.11", "3.12"]') }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          # Install core package with dev dependencies
          pip install -e ".[dev]"

          # Explicitly install pytest-asyncio and faker to ensure they're available
          # This fixes installation order issues on Python 3.11 where pytest might load before pytest-asyncio
          pip install "pytest-asyncio>=0.23.0" faker --no-cache-dir
      - name: Verify test dependencies
        run: |
          # Verify pytest-asyncio is properly installed and can be imported
          python -c "import pytest_asyncio; print(f'pytest-asyncio {pytest_asyncio.__version__} loaded successfully')"
          python -c "import faker; print(f'faker loaded successfully')"
          # Verify pytest can collect tests without errors (validates plugin registration)
          pytest --collect-only --quiet --ignore=tests/e2e | head -20
      - name: Download NLTK data
        # punkt_tab required by NLTK 3.9+ — word_tokenize() loads it internally
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pytest tests/ -m "ci" --cov=file_organizer --cov-report=xml --timeout=30 -n=auto --override-ini="addopts="
          else
            pytest tests/ --cov=file_organizer --cov-fail-under=95 --cov-report=xml --timeout=30 -n=auto --override-ini="addopts="
          fi
      - name: Check docstring coverage
        if: matrix.python-version == '3.11'
        run: interrogate -v src/ --fail-under 90
      - name: Upload coverage
        if: matrix.python-version == '3.11' && github.event_name != 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
