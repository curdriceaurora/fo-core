name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".claude/agents/**"
      - ".claude/commands/**"
      - ".claude/context/**"
      - ".claude/epics/**"
      - ".claude/prds/**"
      - ".claude/rules/**"
      - ".claude/README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".claude/agents/**"
      - ".claude/commands/**"
      - ".claude/context/**"
      - ".claude/epics/**"
      - ".claude/prds/**"
      - ".claude/rules/**"
      - ".claude/README.md"
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          # Install core package with dev dependencies
          pip install -e ".[dev]"

          # Explicitly install pytest-asyncio and faker to ensure they're available
          # This fixes installation order issues on Python 3.11 where pytest might load before pytest-asyncio
          pip install pytest-asyncio>=0.23.0 faker --no-cache-dir
      - name: Verify test dependencies
        run: |
          # Verify pytest-asyncio is properly installed and can be imported
          python -c "import pytest_asyncio; print(f'pytest-asyncio {pytest_asyncio.__version__} loaded successfully')"
          python -c "import faker; print(f'faker loaded successfully')"
          # List installed pytest plugins to verify asyncio plugin is registered
          pytest --co -q --co-ignore=tests/e2e 2>&1 | head -20 || true
      - name: Download NLTK data
        # punkt_tab required by NLTK 3.9+ — word_tokenize() loads it internally
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pytest tests/ -m "not regression" --cov=file_organizer --cov-fail-under=74 --cov-report=xml --timeout=30 -n=auto --override-ini="addopts="
          else
            pytest tests/ --cov=file_organizer --cov-fail-under=74 --cov-report=xml --timeout=30 -n=auto --override-ini="addopts="
          fi
      - name: Check docstring coverage
        if: matrix.python-version == '3.12'
        run: interrogate -v src/ --fail-under 90
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
      - name: Check docstring coverage
        if: matrix.python-version == '3.12'
        continue-on-error: true
        run: |
          pip install interrogate
          interrogate src/file_organizer/ -v
