name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".claude/agents/**"
      - ".claude/commands/**"
      - ".claude/context/**"
      - ".claude/epics/**"
      - ".claude/prds/**"
      - ".claude/rules/**"
      - ".claude/README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".claude/agents/**"
      - ".claude/commands/**"
      - ".claude/context/**"
      - ".claude/epics/**"
      - ".claude/prds/**"
      - ".claude/rules/**"
      - ".claude/README.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      benchmark: ${{ steps.filter.outputs.benchmark }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v5
      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        with:
          filters: |
            benchmark:
              - "src/file_organizer/cli/benchmark.py"
              - "tests/ci/test_benchmark_contracts.py"
              - "tests/cli/test_benchmark*.py"
              - "tests/e2e/**"
              - "tests/fixtures/benchmark*"
              - "tests/fixtures/benchmark*/**"
              - "docs/admin/performance-tuning.md"
              - "docs/cli-reference.md"
              - ".github/workflows/ci.yml"
            desktop:
              - "desktop/**"
              - ".github/workflows/ci.yml"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pre-commit
      - run: pip install -e ".[dev]"
      - run: pre-commit run --all-files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unused-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install "deptry>=0.16.0"
      - run: pip install -e .
      - run: deptry src/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run mypy on gated modules
        run: mypy src/file_organizer/models/

  link-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check documentation links
        run: |
          echo "Checking for broken documentation links..."

          # Extract markdown links from README and docs
          links=$(grep -r -h "\[.*\](.*)" README.md docs/*.md 2>/dev/null | sed -E 's/.*\(([^)]+)\).*/\1/' | grep -E "^\/" | sort -u)

          failed=0
          for link in $links; do
            # Skip external links and anchors
            if [[ "$link" == http* ]]; then
              continue
            fi

            # Remove anchor parts
            filepath=${link%#*}

            # Check if file exists
            if [[ ! -f "$filepath" ]]; then
              echo "❌ Broken link: $link"
              failed=1
            fi
          done

          if [ $failed -eq 1 ]; then
            echo "Some documentation links are broken!"
            exit 1
          fi

          echo "✅ All documentation links are valid"

  test:
    name: Test non-benchmark suite
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJson('["3.11"]') || fromJson('["3.11", "3.12"]') }}
    steps:
      - uses: actions/checkout@v5
        with:
          # fetch-depth: 0 is required for the diff-cover step on PRs —
          # shallow clones lack the merge-base needed to compute the changed-line diff.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          # Install core package with dev dependencies + search (rank-bm25, scikit-learn)
          # search is required for TestBM25Index, TestVectorIndexRecall, TestHybridRetriever,
          # and related CLI/API/copilot tests — not in dev because it is an optional runtime extra.
          pip install -e ".[dev,search]"

          # Explicitly install pytest-asyncio and faker to ensure they're available
          # This fixes installation order issues on Python 3.11 where pytest might load before pytest-asyncio
          pip install "pytest-asyncio>=0.23.0" faker --no-cache-dir
      - name: Verify test dependencies
        run: |
          # Verify pytest-asyncio is properly installed and can be imported
          python -c "import pytest_asyncio; print(f'pytest-asyncio {pytest_asyncio.__version__} loaded successfully')"
          python -c "import faker; print(f'faker loaded successfully')"
          # Verify pytest can collect tests without errors (validates plugin registration)
          pytest --collect-only --quiet --ignore=tests/e2e | head -20
      - name: Download NLTK data
        # punkt_tab required by NLTK 3.9+ — word_tokenize() loads it internally
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pytest tests/ -m "ci and not benchmark" --cov=file_organizer --cov-report=xml --timeout=30 -n=auto --override-ini="addopts="
          else
            pytest tests/ -m "not benchmark" --cov=file_organizer --cov-fail-under=95 --cov-report=xml --timeout=30 -n=auto --override-ini="addopts="
          fi
      - name: Diff coverage gate (PR only)
        # Checks that lines added/changed in this PR are ≥80% covered.
        # Uses the ci-suite coverage.xml generated above — fast, no full-suite re-run.
        # Ratchet: bump --fail-under as coverage improves. Target: 90% per issue #855.
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11'
        run: |
          pip install diff-cover --quiet
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=80
      - name: Check docstring coverage
        if: matrix.python-version == '3.11' && github.event_name != 'pull_request'
        run: interrogate -v src/ --fail-under 95
      - name: Upload coverage
        if: matrix.python-version == '3.11' && github.event_name != 'pull_request'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          file: coverage.xml
          fail_ci_if_error: false

  test-benchmark:
    name: Test benchmark-only suite (no xdist)
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.benchmark == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run benchmark suite
        run: pytest tests/ -m benchmark --benchmark-only --strict-markers --timeout=30 --override-ini="addopts="

  test-integration:
    name: Integration coverage gate
    needs: changes
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev,search]"
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: "Integration coverage gate (floor: 33%)"
        # Ratchet floor — bump threshold in the PR that closes each gap.
        # Baseline measured 2026-03-17: 33.8% (71 integration tests, 16s).
        # Current floor: 33%. Target per issue #856: 90%.
        run: pytest tests/ -m "integration" --strict-markers --cov=file_organizer --cov-fail-under=33 --cov-report=term-missing --cov-report=xml --timeout=60 --override-ini="addopts="

  rust-check:
    name: Rust desktop build
    needs: changes
    if: ${{ needs.changes.outputs.desktop == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Prepare sidecar placeholder for cargo check
        working-directory: desktop/src-tauri
        run: |
          target_triple="$(rustc -vV | grep '^host:' | awk '{print $2}')"
          sidecar_path="binaries/file-organizer-backend-${target_triple}"
          mkdir -p binaries
          if [ ! -f "${sidecar_path}" ]; then
            printf '#!/usr/bin/env bash\nexit 0\n' > "${sidecar_path}"
            chmod +x "${sidecar_path}"
          fi
      - name: Run cargo check
        working-directory: desktop/src-tauri
        run: cargo check --locked
      - name: Run cargo tests
        working-directory: desktop/src-tauri
        run: cargo test --locked
