name: CI Full Matrix

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC — full matrix
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Linux full-suite (Python 3.11 + 3.12, -n auto) — shard matrix removed after 2026-04-15 xdist audit.
  # macOS and Windows run the portable ci/smoke subset only.

  test-linux-full:
    name: "Test Linux (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        # Retry wrapper guards against transient TLS/CDN flakes (issue #145).
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            set -euo pipefail
            pip install -e ".[dev,search]"
            pip install "pytest-asyncio>=0.23.0" faker --no-cache-dir
      - name: Run full test suite
        # tests/extras/ is the canary suite for ci-extras.yml; those tests use
        # hard imports (cv2, torch, imagededup) and intentionally fail — not skip —
        # when the corresponding extra is absent. CI Full installs only [dev,search],
        # so collecting tests/extras/ here produces ModuleNotFoundError at setup.
        # Each extra is exercised by ci-extras.yml with the right install.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pytest tests/ \
            --ignore=tests/extras \
            -m "not benchmark and not e2e" \
            --strict-markers \
            -n auto \
            --dist=loadgroup \
            --timeout=60 \
            --cov=src \
            --cov-report= \
            --override-ini="addopts="
          mv .coverage .coverage.py${{ matrix.python-version }}
      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: daily-coverage-${{ matrix.python-version }}
          path: .coverage.py${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

  coverage-gate:
    name: "Coverage gate (py3.11)"
    needs: test-linux-full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev extras
        # Retry wrapper guards against transient TLS/CDN flakes (issue #145).
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: pip install -e ".[dev]"
      - name: Download coverage data (py3.11)
        uses: actions/download-artifact@v8
        with:
          pattern: daily-coverage-3.11
          merge-multiple: true
      - name: Combine and enforce gate
        # Intentionally no `coverage xml` / Codecov upload here — the daily run
        # enforces the gate only.  Codecov upload lives in ci.yml (push to main).
        run: |
          coverage combine .coverage.py*
          coverage report --fail-under=93

  test-macos:
    name: Test macOS (Python 3.12)
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        # search extra (rank-bm25, scikit-learn) is required by @pytest.mark.ci tests
        # in TestBM25Index, TestVectorIndexRecall, TestHybridRetriever, and TestSemanticSearch.
        # Retry wrapper guards against transient TLS/CDN flakes (issue #145).
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: pip install -e ".[dev,search]"
      - name: Run tests
        # CI Full's cross-platform contract: validate the portable ci/smoke subset on macOS.
        # tests/extras/ is owned by ci-extras.yml; its smoke canaries hard-import optional deps
        # (cv2, torch, imagededup) that aren't installed in [dev,search], so they collide with -m "smoke".
        run: pytest tests/ --ignore=tests/extras --strict-markers --timeout=30 -n=auto --dist=loadgroup --override-ini="addopts=" -m "ci or smoke"

  test-windows:
    name: Test Windows (Python 3.12)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        # search extra (rank-bm25, scikit-learn) is required by @pytest.mark.ci tests
        # in TestBM25Index, TestVectorIndexRecall, TestHybridRetriever, and TestSemanticSearch.
        # Retry wrapper guards against transient TLS/CDN flakes (issue #145).
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: pip install -e ".[dev,search]"
      - name: Run tests
        # CI Full's cross-platform contract: validate the portable ci/smoke subset on Windows.
        # -n=auto intentionally omitted: xdist worker shutdown on Windows propagates
        # CTRL_C_EVENT as KeyboardInterrupt, causing exit code 1 when all tests pass.
        # --timeout omitted: pytest-timeout thread-mode fires during teardown on Windows,
        # producing a spurious KeyboardInterrupt after all tests pass (exit code 1).
        # ProactorEventLoop IOCP teardown race: fixed in tests/conftest.py via
        # SelectorEventLoop on win32 (see ensure_default_event_loop fixture).
        # The 20-minute job timeout provides a sufficient hard cap.
        # tests/extras/ is owned by ci-extras.yml; its smoke canaries hard-import optional deps
        # (cv2, torch, imagededup) that aren't installed in [dev,search], so they collide with -m "smoke".
        run: pytest tests/ --ignore=tests/extras --strict-markers --override-ini="addopts=" -m "ci or smoke"
