name: CI Full Matrix

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC — full matrix
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download NLTK data
        # punkt_tab required by NLTK 3.9+ — word_tokenize() loads it internally
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        run: pytest tests/ --timeout=30 -n=auto --override-ini="addopts="
      - name: Check docstring coverage
        if: matrix.python-version == '3.12'
        run: pipx run interrogate -v src/ --fail-under 90

  test-macos:
    name: Test macOS (Python 3.12)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        run: pytest tests/ --timeout=30 -n=auto --override-ini="addopts="

  test-windows:
    name: Test Windows (Python 3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        run: pytest tests/ --timeout=30 -n=auto --override-ini="addopts="

  frontend-compat:
    name: Frontend Compatibility (placeholder)
    runs-on: ubuntu-latest
    steps:
      - name: Frontend compatibility placeholder
        run: |
          echo "Frontend compatibility tests are not yet implemented."
          echo "This job is a placeholder pending addition of a JS build system (package.json)."
          echo "Re-enable Node setup and npm steps once a frontend build system is introduced."

  frontend-e2e:
    name: Frontend E2E (placeholder — not yet implemented)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: E2E placeholder
        run: |
          echo "E2E tests are not yet implemented."
          echo "This job is a placeholder for future Playwright/Cypress tests."

