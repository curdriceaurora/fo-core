name: CI Full Matrix

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC — full matrix
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Linux Python 3.11/3.12 matrix is owned by ci.yml (runs on push + PR).
  # ci-full.yml covers the extended platform matrix: macOS and Windows.

  test-macos:
    name: Test macOS (Python 3.12)
    runs-on: macos-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        # search extra (rank-bm25, scikit-learn) is required by @pytest.mark.ci tests
        # in TestBM25Index, TestVectorIndexRecall, TestHybridRetriever, and TestSemanticSearch.
        run: pip install -e ".[dev,search]"
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        # Full repo tests include Linux- and POSIX-assumption suites.
        # CI Full's cross-platform contract is to validate the portable CI/smoke subset on macOS/Windows.
        run: pytest tests/ --strict-markers --timeout=30 -n=auto --override-ini="addopts=" -m "ci or smoke"

  test-windows:
    name: Test Windows (Python 3.12)
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        # search extra (rank-bm25, scikit-learn) is required by @pytest.mark.ci tests
        # in TestBM25Index, TestVectorIndexRecall, TestHybridRetriever, and TestSemanticSearch.
        run: pip install -e ".[dev,search]"
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        # Full repo tests include Linux- and POSIX-assumption suites.
        # CI Full's cross-platform contract is to validate the portable CI/smoke subset on macOS/Windows.
        # -n=auto is intentionally omitted on Windows: pytest-xdist worker shutdown on Windows
        # propagates CTRL_C_EVENT as KeyboardInterrupt in threading.Event.wait(), causing exit
        # code 1 even when all tests pass. The ci/smoke subset is small enough (~61 tests) that
        # parallelism provides no benefit.
        run: pytest tests/ --timeout=30 --override-ini="addopts=" -m "ci or smoke"
