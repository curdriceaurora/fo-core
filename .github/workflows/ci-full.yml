name: CI Full Matrix

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC — full matrix
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Linux Python 3.11/3.12 matrix is owned by ci.yml (runs on push + PR).
  # ci-full.yml covers the extended platform matrix: macOS and Windows.

  test-macos:
    name: Test macOS (Python 3.12)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        run: pytest tests/ --timeout=30 -n=auto --override-ini="addopts="

  test-windows:
    name: Test Windows (Python 3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('wordnet', quiet=True)"
      - name: Run tests
        run: pytest tests/ --timeout=30 -n=auto --override-ini="addopts="
