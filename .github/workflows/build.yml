name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.0.0-alpha.3)'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          # Keep the Intel macOS build explicit because macos-latest is arm64.
          - os: macos-15-intel
            platform: macos
            arch: x86_64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linux AppImage dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests
        run: |
          pytest tests/ -q --override-ini="addopts=" -p no:cacheprovider --tb=short

      - name: Build CLI executable
        run: |
          python scripts/build.py --clean

      - name: Build AppImage
        if: matrix.platform == 'linux'
        run: |
          bash scripts/build_linux.sh

      - name: Verify executables
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cli_exe=$(find dist -name "fo-*.exe" -type f | head -1)
          else
            cli_exe=$(find dist -maxdepth 1 -type f -name "fo-*" -perm /111 \
              -not -name "*.AppImage" \
              -not -name "*.tar.gz" \
              -not -name "*.zip" \
              -not -name "*.sha256" \
              -not -name "*.txt" | head -1)
          fi

          if [ -z "$cli_exe" ]; then
            echo "ERROR: No CLI executable found in dist/"
            ls -la dist/
            exit 1
          fi
          echo "CLI executable: $cli_exe ($(du -h "$cli_exe" | cut -f1))"

          if [ "${{ matrix.platform }}" = "linux" ]; then
            appimage=$(find dist -maxdepth 1 -type f -name "*.AppImage" | head -1)
            if [ -z "$appimage" ]; then
              echo "ERROR: No AppImage found in dist/ after Linux AppImage build"
              ls -la dist/
              exit 1
            fi
            echo "AppImage: $appimage ($(du -h "$appimage" | cut -f1))"
          fi

          "$cli_exe" --help || true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fo-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 30

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f \( -name "fo*" -o -name "*.exe" \) | while read f; do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
          draft: true
          generate_release_notes: true
