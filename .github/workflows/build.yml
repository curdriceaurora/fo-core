name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.0.0-alpha.3)'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          # Keep the Intel macOS build explicit because macos-latest is arm64.
          - os: macos-15-intel
            platform: macos
            arch: x86_64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pywebview Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            libcairo2-dev \
            gir1.2-webkit2-4.1 \
            fuse \
            libfuse2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[desktop,dev]"
          pip install pyinstaller

      - name: Run tests
        run: |
          pytest tests/ -q --override-ini="addopts=" -p no:cacheprovider --tb=short

      - name: Build CLI executable
        run: |
          python scripts/build.py --clean

      - name: Build Desktop executable
        run: |
          python scripts/build.py --desktop

      - name: Build AppImage
        if: matrix.platform == 'linux'
        run: |
          bash scripts/build_linux.sh

      - name: Verify executables
        shell: bash
        run: |
          # Find CLI executable
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cli_exe=$(find dist -name "file-organizer-*" -not -name "*desktop*" -name "*.exe" -type f | head -1)
            desktop_exe=$(find dist -name "file-organizer-desktop-*.exe" -type f | head -1)
          else
            cli_exe=$(find dist -maxdepth 1 -type f -name "file-organizer-*" -not -name "*desktop*" -perm /111 | head -1)
            desktop_exe=$(find dist -maxdepth 1 -type f -name "file-organizer-desktop-*" -perm /111 | head -1)
          fi

          if [ -z "$cli_exe" ]; then
            echo "ERROR: No CLI executable found in dist/"
            ls -la dist/
            exit 1
          fi
          echo "CLI executable: $cli_exe ($(du -h "$cli_exe" | cut -f1))"

          if [ -z "$desktop_exe" ]; then
            echo "ERROR: No desktop executable found in dist/"
            ls -la dist/
            exit 1
          fi
          echo "Desktop executable: $desktop_exe ($(du -h "$desktop_exe" | cut -f1))"

          # Basic smoke test for CLI
          "$cli_exe" --help || true

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: file-organizer-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 30

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f \( -name "file-organizer*" -o -name "*.exe" \) | while read f; do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
          draft: true
          generate_release_notes: true
