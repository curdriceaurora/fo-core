name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.0.0-alpha.1)'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: macos-13
            platform: macos
            arch: x86_64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: file_organizer_v2
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Install AppImage dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2

      - name: Run tests
        working-directory: file_organizer_v2
        run: |
          pytest tests/ -q --override-ini="addopts=" -p no:cacheprovider --tb=short

      - name: Build executable
        working-directory: file_organizer_v2
        run: |
          python scripts/build.py --clean

      - name: Build AppImage
        if: matrix.platform == 'linux'
        working-directory: file_organizer_v2
        run: |
          bash scripts/build_linux.sh

      - name: Verify executable
        working-directory: file_organizer_v2
        shell: bash
        run: |
          # Find the built executable
          if [ "${{ matrix.platform }}" = "windows" ]; then
            exe=$(find dist -name "*.exe" -type f | head -1)
          else
            exe=$(find dist -type f -perm +111 | head -1)
          fi

          if [ -z "$exe" ]; then
            echo "ERROR: No executable found in dist/"
            ls -la dist/
            exit 1
          fi

          echo "Found executable: $exe"
          echo "Size: $(du -h "$exe" | cut -f1)"

          # Basic smoke test
          "$exe" --help || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-organizer-${{ matrix.platform }}-${{ matrix.arch }}
          path: file_organizer_v2/dist/*
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f \( -name "file-organizer*" -o -name "*.exe" \) | while read f; do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
          draft: true
          generate_release_notes: true
