name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.0.0-alpha.1)'
        required: false
        default: ''

jobs:
  test-rust:
    name: Rust Tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Install Tauri Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Rust tests
        working-directory: desktop
        run: cargo test --all

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          # Keep the Intel macOS build explicit because macos-latest is arm64.
          - os: macos-15-intel
            platform: macos
            arch: x86_64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Install Tauri Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Install AppImage dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get install -y fuse libfuse2

      - name: Run tests
        run: |
          pytest tests/ -q --override-ini="addopts=" -p no:cacheprovider --tb=short

      - name: Build executable
        run: |
          python scripts/build.py --clean

      - name: Build AppImage
        if: matrix.platform == 'linux'
        run: |
          bash scripts/build_linux.sh

      - name: Verify executable
        shell: bash
        run: |
          # Find the built executable
          if [ "${{ matrix.platform }}" = "windows" ]; then
            exe=$(find dist -name "*.exe" -type f | head -1)
          else
            exe=$(find dist -type f -perm /111 | head -1)
          fi

          if [ -z "$exe" ]; then
            echo "ERROR: No executable found in dist/"
            ls -la dist/
            exit 1
          fi

          echo "Found executable: $exe"
          echo "Size: $(du -h "$exe" | cut -f1)"

          # Basic smoke test
          "$exe" --help || true

      - name: Rename sidecar for Tauri
        shell: bash
        run: |
          # Get Rust target triple
          TARGET_TRIPLE=$(rustc -vV | grep host | cut -d' ' -f2)
          SIDECAR_NAME="file-organizer-backend-${TARGET_TRIPLE}"

          # Copy PyInstaller output to sidecar location expected by Tauri
          if [ "${{ matrix.platform }}" = "windows" ]; then
            SRC=$(find dist -name "file-organizer.exe" | head -1)
            mkdir -p desktop/src-tauri/binaries
            cp "$SRC" "desktop/src-tauri/binaries/${SIDECAR_NAME}.exe"
          else
            SRC=$(find dist -type f -perm /111 -name "file-organizer" | head -1)
            mkdir -p desktop/src-tauri/binaries
            cp "$SRC" "desktop/src-tauri/binaries/${SIDECAR_NAME}"
            chmod +x "desktop/src-tauri/binaries/${SIDECAR_NAME}"
          fi
          echo "Sidecar placed: desktop/src-tauri/binaries/${SIDECAR_NAME}"

      - name: Build Tauri desktop app
        working-directory: desktop
        run: |
          npm install
          npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect Tauri artifacts
        shell: bash
        run: |
          mkdir -p combined-artifacts
          # Copy PyInstaller output
          cp -r dist/* combined-artifacts/ 2>/dev/null || true
          # Copy Tauri bundles
          if [ "${{ matrix.platform }}" = "macos" ]; then
            find desktop/src-tauri/target/release/bundle -name "*.dmg" -exec cp {} combined-artifacts/ \; 2>/dev/null || true
            find desktop/src-tauri/target/release/bundle -name "*.app" -exec cp -r {} combined-artifacts/ \; 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            find desktop/src-tauri/target/release/bundle -name "*.AppImage" -exec cp {} combined-artifacts/ \; 2>/dev/null || true
            find desktop/src-tauri/target/release/bundle -name "*.deb" -exec cp {} combined-artifacts/ \; 2>/dev/null || true
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            find desktop/src-tauri/target/release/bundle -name "*.exe" -exec cp {} combined-artifacts/ \; 2>/dev/null || true
            find desktop/src-tauri/target/release/bundle -name "*.msi" -exec cp {} combined-artifacts/ \; 2>/dev/null || true
          fi
          ls -la combined-artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: file-organizer-${{ matrix.platform }}-${{ matrix.arch }}
          path: combined-artifacts/*
          retention-days: 30

  release:
    needs: [build, test-rust]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f \( -name "file-organizer*" -o -name "*.exe" \) | while read f; do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
          draft: true
          generate_release_notes: true
