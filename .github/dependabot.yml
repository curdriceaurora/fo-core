version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "diff-cover"
      - dependency-name: "numpy"
      - dependency-name: "Pillow"
      - dependency-name: "pre-commit"
      - dependency-name: "psutil"
      - dependency-name: "pytest"
      - dependency-name: "pytest-asyncio"
      - dependency-name: "pytest-benchmark"
      - dependency-name: "pytest-cov"
      - dependency-name: "pytest-randomly"
      - dependency-name: "rich"
      - dependency-name: "tinytag"
      - dependency-name: "watchdog"
      # mypy 2.x: pre-commit `mypy-changed` hook fails on subclasses of
      # Any-typed bases (FileSystemEventHandler, click.Group, TyperGroup),
      # producing 8 new errors not present in 1.x. See pyproject.toml
      # comment on the `mypy` constraint; matched lint failure on PR #425.
      - dependency-name: "mypy"
        versions: [">=2.0.0"]
      # pytest-timeout 2.4.0: timer thread not cancelled on Windows, crashes
      # during teardown (AssertionError in read_global_capture). See
      # pyproject.toml comment on the `pytest-timeout` constraint.
      - dependency-name: "pytest-timeout"
        versions: [">=2.4.0"]
      # typer 0.26+: vendored its own `_click` module and broke parent-class
      # type annotations in `src/cli/lazy.py` (`LazyCommandProxy(click.Group)`).
      # See pyproject.toml comment on the `typer[all]` constraint; matched
      # type-check / lint / Test PR suite / Integration tests failure on PR #443.
      - dependency-name: "typer"
        versions: [">=0.26"]
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "coverage"
      security:
        patterns:
          - "cryptography"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "ci"

  # The "docker" ecosystem was removed: fo-core ships no Dockerfile or
  # Kubernetes YAML, so the weekly Dependabot run reliably exited with
  # "No Dockerfiles nor Kubernetes YAML found in /" (e.g. job 1410440561,
  # run 27441929109 on 2026-06-12). Re-add this entry if a Dockerfile is
  # ever introduced.
