# Accepted-risk allowlist for the `.[all]` audit (optional extras).
#
# This file is paired with the `audit-dependencies-extras` job in
# .github/workflows/security.yml, which installs `pip install -e .[all]` so
# optional-extra transitive risks (via `[llama]`, `[media]`, `[search]`, etc.)
# are surfaced. The base-install audit uses .github/accepted-risks.yml
# separately; each allowlist scopes to only the packages its audit job
# actually installs (#166).
#
# Schema is the same as .github/accepted-risks.yml — enforced by
# scripts/pip_audit_gate.py:
#   - advisory_id : string, GHSA-/PYSEC-/CVE- prefix
#   - package     : string, PyPI distribution name
#   - version_spec: string, PEP 440 specifier
#   - reason      : string, why the code path is unreachable for fo-core
#   - expires_on  : YYYY-MM-DD (≤ 6 months from add date)
#   - platform    : string, optional sys.platform value (e.g. "darwin");
#                   when set the entry is silently skipped on non-matching
#                   platforms — use for macOS-only transitive deps

allowlist:
  - advisory_id: CVE-2025-69872
    package: diskcache
    version_spec: "<=5.6.3"
    reason: >-
      Transitive via llama-cpp-python (``[llama]`` extra). The vulnerable
      cache-path code path is never invoked by fo-core — the ``[llama]``
      surface only uses llama-cpp-python for local inference, and the disk
      cache is pinned to a per-model temp dir we control. Upstream has no
      patched release as of 2026-04-23; re-evaluate when diskcache ships
      a 5.6.x+ that addresses the advisory.
    expires_on: 2026-10-23
  - advisory_id: PYSEC-2022-42969
    package: py
    version_spec: "<=1.11.0"
    reason: >-
      Transitive via pytest (``[dev]`` / ``[all]`` test extras). The
      advisory is a ReDoS in ``py.path.svnwc`` — SVN working-copy handling
      that fo-core never invokes. Our pytest usage is limited to the core
      test runner; no SVN-adjacent helpers are imported. The ``py``
      package is effectively unmaintained (last release 2022-11) so no
      upstream fix is expected. Re-evaluate when pytest drops the ``py``
      dependency entirely (upstream tracking issue pytest-dev/pytest#10462).
    expires_on: 2026-10-23
  # torch 2.12.0 — 5 advisories remaining, no patched release available as of 2026-05-20.
  # fo-core uses torch transitively via imagededup ([dedup-image]) and
  # faster-whisper ([media]). It never calls torch.load() on user-provided or
  # untrusted model files; models are downloaded from official HuggingFace
  # repos at install/first-run time only. Re-evaluate when torch 2.13+ ships.
  - advisory_id: PYSEC-2025-194
    package: torch
    version_spec: "==2.12.0"
    reason: >-
      Pickle-deserialization advisory. fo-core never loads user-supplied model
      files via torch.load(); models come from trusted HuggingFace repos only.
    expires_on: 2026-11-20
  - advisory_id: PYSEC-2025-195
    package: torch
    version_spec: "==2.12.0"
    reason: >-
      Pickle-deserialization advisory. fo-core never loads user-supplied model
      files via torch.load(); models come from trusted HuggingFace repos only.
    expires_on: 2026-11-20
  - advisory_id: PYSEC-2025-196
    package: torch
    version_spec: "==2.12.0"
    reason: >-
      Pickle-deserialization advisory. fo-core never loads user-supplied model
      files via torch.load(); models come from trusted HuggingFace repos only.
    expires_on: 2026-11-20
  - advisory_id: PYSEC-2025-197
    package: torch
    version_spec: "==2.12.0"
    reason: >-
      Pickle-deserialization advisory. fo-core never loads user-supplied model
      files via torch.load(); models come from trusted HuggingFace repos only.
    expires_on: 2026-11-20
  - advisory_id: PYSEC-2025-210
    package: torch
    version_spec: "==2.12.0"
    reason: >-
      Pickle-deserialization advisory. fo-core never loads user-supplied model
      files via torch.load(); models come from trusted HuggingFace repos only.
    expires_on: 2026-11-20
  # transformers — 1 advisory remaining, no patched release available as of 2026-05-20.
  # Transitive via faster-whisper ([media] extra) on macOS only; `pip install -e .[all]`
  # resolves transformers ~5.9 on macOS CI. `platform: darwin` limits gate enforcement
  # to macOS runners. Re-evaluate when transformers ships a patched 5.x release.
  - advisory_id: PYSEC-2025-211
    package: transformers
    version_spec: ">=5.0.0"
    platform: darwin
    reason: >-
      Transitive via faster-whisper ([media], macOS only). fo-core never loads
      user-supplied model weights through transformers directly. No patched
      release as of 2026-05-20.
    expires_on: 2026-11-20
