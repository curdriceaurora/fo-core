# CodeQL configuration for local file organizer.
# We validate user-provided paths against an explicit allowlist in API modules.
# Exclude these helpers from CodeQL path-injection alerts to avoid false positives.
# These modules use configuration-controlled paths, not user-provided values.
paths-ignore:
  - src/api/utils.py
  - src/api/api_keys.py
  - src/api/routers/search.py
  - tests/fixtures/review_regressions/security/**
