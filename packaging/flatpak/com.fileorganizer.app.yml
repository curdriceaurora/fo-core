app-id: com.fileorganizer.app
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: file-organizer

finish-args:
  - --filesystem=home
  - --share=network
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc

modules:
  - name: file-organizer
    buildsystem: simple
    build-commands:
      # Install the Tauri desktop binary
      - install -Dm755 file-organizer /app/bin/file-organizer
      # Install the Python sidecar binary
      - install -Dm755 file-organizer-sidecar /app/bin/file-organizer-sidecar
      # Install desktop entry
      - install -Dm644 com.fileorganizer.app.desktop /app/share/applications/com.fileorganizer.app.desktop
      # Install application icon
      - install -Dm644 icons/256x256/com.fileorganizer.app.png /app/share/icons/hicolor/256x256/apps/com.fileorganizer.app.png
      - install -Dm644 icons/128x128/com.fileorganizer.app.png /app/share/icons/hicolor/128x128/apps/com.fileorganizer.app.png
      - install -Dm644 icons/64x64/com.fileorganizer.app.png /app/share/icons/hicolor/64x64/apps/com.fileorganizer.app.png
      # Install AppStream metadata
      - install -Dm644 com.fileorganizer.app.metainfo.xml /app/share/metainfo/com.fileorganizer.app.metainfo.xml
    sources:
      - type: file
        path: ../../desktop/src-tauri/target/release/file-organizer
        dest-filename: file-organizer
      - type: file
        path: ../../desktop/src-tauri/target/release/file-organizer-sidecar
        dest-filename: file-organizer-sidecar
      - type: file
        path: com.fileorganizer.app.desktop
      - type: file
        path: com.fileorganizer.app.metainfo.xml
      - type: dir
        path: icons
