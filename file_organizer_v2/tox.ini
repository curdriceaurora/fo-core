[tox]
requires =
    tox>=4
env_list = py39, py310, py311, py312, lint, type
skip_missing_interpreters = true

[testenv]
description = Run tests under {base_python}
deps =
    pytest>=7.4.0
    pytest-asyncio>=0.23.0
    pytest-cov>=4.1.0
    pytest-mock>=3.12.0
changedir = {toxinidir}
commands =
    pytest tests/ -v --tb=short -x {posargs}

[testenv:lint]
description = Run linting with ruff
base_python = python3
deps =
    ruff>=0.1.0
commands =
    ruff check src/ tests/ {posargs}

[testenv:type]
description = Run type checking with mypy
base_python = python3
deps =
    mypy>=1.8.0
commands =
    mypy src/file_organizer/ --python-version 3.9 --ignore-missing-imports {posargs}

[testenv:py39]
base_python = python3.9

[testenv:py310]
base_python = python3.10

[testenv:py311]
base_python = python3.11

[testenv:py312]
base_python = python3.12
