<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Organizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .splash {
      text-align: center;
    }
    .splash h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #f5f5f5;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 1rem;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 0.9rem;
      color: #aaa;
    }
    .error {
      color: #ff6b6b;
      display: none;
    }
  </style>
</head>
<body>
  <div class="splash">
    <h1>File Organizer</h1>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">Starting backend...</p>
    <p class="error" id="error"></p>
  </div>
  <script>
    // Poll the sidecar state and navigate to the backend UI once ready.
    const POLL_INTERVAL_MS = 500;

    async function pollState() {
      try {
        // Use Tauri's invoke to call the get_sidecar_state command.
        const result = await window.__TAURI__.core.invoke('get_sidecar_state');
        const state = result.state;
        const port = result.port;

        if (state === 'ready' && port > 0) {
          document.getElementById('status').textContent = 'Redirecting...';
          window.location.href = 'http://127.0.0.1:' + port + '/ui/';
          return;
        }

        if (state === 'unhealthy' || state === 'error') {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('status').style.display = 'none';
          const el = document.getElementById('error');
          el.style.display = 'block';
          el.textContent = result.message || 'Backend failed to start.';
          return;
        }

        // Still starting -- keep polling.
        document.getElementById('status').textContent = 'Starting backend...';
      } catch (e) {
        // Tauri API not ready yet -- retry.
      }
      setTimeout(pollState, POLL_INTERVAL_MS);
    }

    // Also listen for the sidecar-state event in case it fires before polling.
    if (window.__TAURI__ && window.__TAURI__.event) {
      window.__TAURI__.event.listen('sidecar-state', function(event) {
        var p = event.payload;
        if (p.state === 'ready' && p.port > 0) {
          window.location.href = 'http://127.0.0.1:' + p.port + '/ui/';
        }
      });
    }

    // Start polling after a short delay to let the Tauri runtime initialise.
    setTimeout(pollState, 300);
  </script>
</body>
</html>
