<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Organizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #4f9cf9 0%, #2ecc71 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(79, 156, 249, 0.3);
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(79, 156, 249, 0.2);
      border-top-color: #4f9cf9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { margin-top: 16px; font-size: 12px; color: #666; min-height: 18px; }
    .error-panel {
      display: none;
      text-align: center;
      padding: 16px;
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      border-radius: 8px;
      margin-top: 16px;
    }
    .error-panel.visible { display: block; }
    .retry-btn {
      margin-top: 12px;
      padding: 8px 20px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .retry-btn:hover { background: #c0392b; }
  </style>
</head>
<body>
  <div class="logo">📁</div>
  <h1>File Organizer</h1>
  <p class="subtitle">AI-powered local file management</p>
  <div class="spinner" id="spinner"></div>
  <p class="status" id="status">Starting backend...</p>
  <div class="error-panel" id="errorPanel">
    <p id="errorMsg">Backend failed to start</p>
    <p style="font-size:11px; color:#888; margin-top:8px;">
      Check logs at <code id="logPath">~/.config/file-organizer/logs/</code>
    </p>
    <button class="retry-btn" onclick="retry()">Retry</button>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function showError(msg, logPath) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('errorMsg').textContent = msg || 'Backend failed to start';
      if (logPath) document.getElementById('logPath').textContent = logPath;
      document.getElementById('errorPanel').classList.add('visible');
    }

    function retry() {
      window.location.reload();
    }

    // Listen for sidecar events
    listen('sidecar-state', (event) => {
      const { state, port, message } = event.payload;
      if (state === 'starting') {
        setStatus('Starting backend...');
      } else if (state === 'ready') {
        setStatus('Ready! Loading...');
        // Navigate to the main web UI
        const url = `http://127.0.0.1:${port}/`;
        window.location.href = url;
      } else if (state === 'crashed') {
        showError(message || 'Backend crashed after 3 retries');
      } else if (state === 'stopped') {
        showError('Backend stopped unexpectedly');
      }
    });

    // Also check via invoke in case event was missed
    invoke('get_sidecar_state').then((result) => {
      if (result.state === 'ready') {
        window.location.href = `http://127.0.0.1:${result.port}/`;
      } else if (result.state === 'crashed' || result.state === 'stopped') {
        showError(result.message);
      }
    }).catch(() => {
      // Command may not exist yet in early startup - normal
    });
  </script>
</body>
</html>
